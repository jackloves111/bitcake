name: Snapshot Release
permissions:
  contents: write  # 必需权限
  packages: write  # Docker 镜像推送权限

on:
  push:
    tags:
      - 'v*'  # 只在推送 v 开头的 tag 时触发，如 v1.0.0
  workflow_dispatch:    # 保留手动触发
    inputs:
      environment:
        description: '手动发布'
        required: true
        default: 'stage'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 获取完整提交历史（[[0]](#__0) [[10]](#__10)）

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install

      - name: Extract package version
        id: package-version
        run: |
          VERSION=$(jq -r .version package.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Get short commit SHA
        id: commit-id
        run: echo "short_sha=$(git rev-parse --short=7 HEAD)" >> $GITHUB_OUTPUT

      - name: Build Transmission version
        run: pnpm run build:transmission

      - name: Build qBittorrent version
        run: pnpm run build:qbittorrent

      - name: Compress files to ZIP
        run: |
          # 压缩 Transmission 版本
          cd dist-transmission
          zip -r ../bitcake-${{ steps.package-version.outputs.version }}-transmission.zip .
          cd ..

          # 压缩 qBittorrent 版本 (在 public 子目录中)
          cd dist-qbittorrent
          zip -r ../bitcake-${{ steps.package-version.outputs.version }}-qbittorrent.zip .
          cd ..

          # 输出文件路径供后续步骤使用
          echo "TRANSMISSION_ZIP=$(pwd)/bitcake-${{ steps.package-version.outputs.version }}-transmission.zip" >> $GITHUB_ENV
          echo "QBITTORRENT_ZIP=$(pwd)/bitcake-${{ steps.package-version.outputs.version }}-qbittorrent.zip" >> $GITHUB_ENV

      - name: Extract version without v prefix
        id: version-clean
        run: |
          CLEAN_VERSION=${GITHUB_REF_NAME#v}
          echo "clean_version=$CLEAN_VERSION" >> $GITHUB_OUTPUT

      - name: Create Snapshot Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ steps.version-clean.outputs.clean_version }}
          body: |
            Automated snapshot build from commit ${{ github.sha }}

            ## 📦 Build Artifacts
            - `bitcake-${{ steps.package-version.outputs.version }}-transmission.zip` - Transmission 客户端版本
            - `bitcake-${{ steps.package-version.outputs.version }}-qbittorrent.zip` - qBittorrent 客户端版本

            ## 🐳 Docker Image
            ```bash
            docker pull ghcr.io/${{ github.repository_owner }}/bitcake:${{ steps.version-clean.outputs.clean_version }}
            docker pull ghcr.io/${{ github.repository_owner }}/bitcake:latest
            ```
          prerelease: false
          files: |
            ${{ env.TRANSMISSION_ZIP }}
            ${{ env.QBITTORRENT_ZIP }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Docker 镜像构建和推送
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/bitcake
          tags: |
            type=raw,value=${{ steps.version-clean.outputs.clean_version }}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
